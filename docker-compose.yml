services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lostfound
      POSTGRES_PASSWORD: lostfound
      POSTGRES_DB: lostfound
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lostfound"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://lostfound:lostfound@db:5432/lostfound
      PUBLIC_BASE_URL: http://localhost:8000
      CORS_ORIGINS: http://localhost:3000
      SEED_DB: "true"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
  backend_uploads:
